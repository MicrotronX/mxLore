[Server]
; URL des mxLore MCP-Servers
Url=https://YOUR-SERVER/mxLore/mcp
; API-Key for developer identification (from Admin UI)
ApiKey=YOUR_API_KEY_HERE
; TCP-Verbindungsaufbau Timeout in ms (Default: 10000)
ConnectionTimeout=10000
; Response/Read Timeout in ms (Default: 120000)
ReadTimeout=120000

[General]
; Log verbosity. 'info' = production-clean (startup + errors + warnings).
; 'debug' = hot-path tracing ([run] Iter=N, [http] Forward entry/return, [stdio] slug parse).
; Enable debug only for bug hunts — produces ~5-10 lines per MCP tool-call in mxMCPProxy.log.
LogLevel=info

[Agent]
; Multi-Agent Kommunikation: Proxy pollt Inbox, schreibt in Datei
Polling=1
; Poll-Intervall in Sekunden (Default: 15, Minimum: 5)
PollInterval=15
